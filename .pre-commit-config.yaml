fail_fast: false
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks-docker
  - repo: https://github.com/returntocorp/semgrep
    rev: v1.138.0
    hooks:
      - id: semgrep
        name: Semgrep SAST
        args:
          - --config=p/security-audit
          - --config=p/javascript
          - --config=p/nodejs
          - --config=p/owasp-top-ten
          - --error
          - --skip-unknown-extensions
        files: \.(js|ts)$
        exclude: node_modules/
